<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Speak Spanish Way · Erik</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Caveat:wght@400;600&family=Cinzel:wght@500;600&family=EB+Garamond:ital,wght@0,400;0,600;1,400&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --navy: #1B2140;
  --navy-card: #2a325f;
  --orange: #E8681A;
  --gold: #C9A96E;
  --cream: #F5F2EC;
  --cream-dim: rgba(245,242,236,0.55);
  --cream-muted: rgba(245,242,236,0.28);
}

body {
  background: var(--navy);
  min-height: 100vh;
  font-family: 'DM Sans', sans-serif;
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 40px 22px 68px;
  color: var(--cream);
}

.topbar {
  width: 100%; max-width: 540px;
  display: flex; justify-content: space-between; align-items: flex-end;
  margin-bottom: 30px;
}
.brand {
  font-family: 'Cinzel', serif;
  font-size: 13px; letter-spacing: 2px; text-transform: uppercase;
  color: var(--orange); font-weight: 500; line-height: 1;
}
.student-name {
  font-family: 'EB Garamond', serif;
  font-size: 30px; color: var(--cream);
  line-height: 1; font-weight: 400;
}

.progress-row {
  width: 100%; max-width: 540px;
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 32px;
}
.dots-row { display: flex; gap: 6px; flex-wrap: wrap; }
.dot {
  width: 8px; height: 8px; border-radius: 50%;
  background: rgba(255,255,255,0.1);
  transition: background 0.35s;
}
.dot.active { background: var(--orange); box-shadow: 0 0 7px rgba(232,104,26,0.5); }
.dot.hit    { background: var(--gold); }
.dot.miss   { background: rgba(255,255,255,0.18); }
.prog-text {
  font-size: 13px; color: var(--cream-muted);
  font-weight: 300; letter-spacing: 1px; white-space: nowrap; margin-left: 16px;
}

.scene {
  perspective: 1400px;
  width: 100%; max-width: 540px; height: 340px;
  cursor: pointer; margin-bottom: 28px;
  transition: opacity 0.22s ease, transform 0.22s ease;
}
.card-body {
  width: 100%; height: 100%; position: relative;
  transform-style: preserve-3d;
  transition: transform 0.7s cubic-bezier(0.4,0,0.2,1);
}
.card-body.flipped { transform: rotateY(180deg); }
.face {
  position: absolute; width: 100%; height: 100%;
  backface-visibility: hidden; border-radius: 22px;
  padding: 44px; display: flex; flex-direction: column; justify-content: center;
}
.front {
  background: var(--cream); color: var(--navy);
  align-items: center; text-align: center;
}
.back {
  background: var(--navy-card);
  border: 1px solid rgba(201,169,110,0.25);
  transform: rotateY(180deg);
}
.face-label {
  font-size: 10px; letter-spacing: 3px; text-transform: uppercase;
  font-weight: 500; margin-bottom: 16px;
}
.front .face-label { color: var(--orange); }
.back  .face-label { color: var(--gold); }
.word {
  font-family: 'EB Garamond', serif;
  font-size: clamp(28px, 6vw, 56px);
  line-height: 1.1; color: var(--navy);
  margin-bottom: 10px; letter-spacing: -0.5px;
}
.tap-hint {
  font-size: 13px; color: rgba(27,33,64,0.45);
  letter-spacing: 0.5px; margin-top: 22px;
  animation: pulse 2s ease-in-out infinite;
}
@keyframes pulse {
  0%, 100% { opacity: 0.45; }
  50%       { opacity: 1; }
}
.def {
  font-family: 'EB Garamond', serif;
  font-size: clamp(22px, 4.5vw, 30px);
  line-height: 1.35; color: var(--cream); margin-bottom: 24px;
}
.example {
  font-size: 14px; color: var(--cream-dim);
  font-style: italic; line-height: 1.7;
  padding-left: 16px; border-left: 2px solid var(--orange);
}

.actions {
  display: flex; gap: 12px;
  width: 100%; max-width: 540px;
  opacity: 0; pointer-events: none;
  transition: opacity 0.35s 0.25s;
}
.actions.on { opacity: 1; pointer-events: all; }
.btn {
  flex: 1; padding: 17px 16px;
  border-radius: 14px; border: none;
  font-family: 'DM Sans', sans-serif;
  font-size: 14px; font-weight: 500;
  cursor: pointer; letter-spacing: 0.3px;
  transition: transform 0.12s;
}
.btn:active { transform: scale(0.97); }
.btn-yes { background: var(--gold); color: var(--navy); }
.btn-no  {
  background: transparent; color: var(--cream-muted);
  border: 1px solid rgba(245,242,236,0.15);
}
.btn-no:hover { border-color: rgba(245,242,236,0.32); color: var(--cream-dim); }

.receipt-wrap {
  display: none; flex-direction: column;
  align-items: center; width: 100%; max-width: 540px;
  animation: fadeUp 0.5s cubic-bezier(0.4,0,0.2,1);
}
@keyframes fadeUp {
  from { opacity: 0; transform: translateY(24px); }
  to   { opacity: 1; transform: translateY(0); }
}

.receipt {
  width: 100%;
  background: var(--cream);
  border-radius: 22px;
  padding: 40px 36px 38px;
  color: var(--navy);
  position: relative;
  margin-bottom: 22px;
}

.r-top {
  display: flex; justify-content: space-between; align-items: flex-start;
  margin-bottom: 4px;
}
.r-brand {
  font-family: 'Cinzel', serif;
  font-size: 12px; letter-spacing: 2px; text-transform: uppercase;
  color: var(--orange); font-weight: 500;
}
.r-date { font-size: 11px; color: rgba(27,33,64,0.32); letter-spacing: 0.3px; }
.r-student {
  font-family: 'EB Garamond', serif;
  font-size: 34px; color: var(--navy); margin-bottom: 6px; line-height: 1;
}
.r-goal {
  font-family: 'Caveat', cursive;
  font-size: 18px; color: rgba(27,33,64,0.45);
  margin-bottom: 24px; line-height: 1;
}

.r-dash {
  border: none;
  border-top: 1.5px dashed rgba(27,33,64,0.17);
  margin: 18px 0;
}

.r-items { margin: 4px 0; }

.r-item {
  display: flex; align-items: baseline;
  gap: 14px; padding: 8px 0;
  opacity: 0;
  animation: slideIn 0.28s ease forwards;
}
@keyframes slideIn {
  from { opacity: 0; transform: translateX(-10px); }
  to   { opacity: 1; transform: translateX(0); }
}
.r-mark {
  font-size: 14px; font-weight: 600;
  min-width: 18px; text-align: center; flex-shrink: 0;
}
.r-mark.hit  { color: #2b9a5a; }
.r-mark.miss { color: rgba(27,33,64,0.22); }
.r-word {
  font-family: 'EB Garamond', serif;
  font-size: 19px; color: var(--navy); line-height: 1.2;
}

.r-total-row {
  display: flex; justify-content: space-between; align-items: baseline;
  padding: 4px 0;
}
.r-total-label {
  font-size: 10px; letter-spacing: 3px; text-transform: uppercase;
  color: rgba(27,33,64,0.38); font-weight: 500;
}
.r-total-score {
  font-family: 'EB Garamond', serif;
  font-size: 52px; color: var(--navy); line-height: 1;
}

.r-phrase {
  font-family: 'EB Garamond', serif;
  font-size: 27px; font-style: italic;
  color: var(--navy); line-height: 1.4;
  margin: 28px 0 32px;
  white-space: pre-line;
}

.r-footer {
  font-size: 12px; letter-spacing: 2px; text-transform: uppercase;
  color: rgba(27,33,64,0.48); font-weight: 500;
}

.r-whatsapp {
  width: 100%;
  margin: 0 0 24px;
  padding: 20px 22px;
  background: rgba(245,242,236,0.05);
  border-radius: 14px;
  border: 1px solid rgba(245,242,236,0.1);
}
.r-whatsapp-text {
  font-size: 14px; color: var(--cream-dim);
  line-height: 1.65; margin-bottom: 16px;
}
.r-whatsapp-text strong { color: var(--cream); font-weight: 500; }
.r-whatsapp-btn {
  display: inline-block;
  background: #25D366;
  color: white;
  text-decoration: none;
  padding: 11px 22px;
  border-radius: 10px;
  font-size: 14px; font-weight: 500;
  letter-spacing: 0.2px;
}

.hint {
  font-size: 12px; color: var(--cream-muted);
  letter-spacing: 1px; margin-bottom: 18px;
  text-align: center;
}

.stamp {
  position: absolute;
  bottom: 36px; right: 32px;
  width: 76px; height: 76px;
  border: 3px solid var(--orange);
  border-radius: 50%;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  transform: rotate(-14deg) scale(0);
  opacity: 0;
  transition: transform 0.4s cubic-bezier(0.34,1.56,0.64,1), opacity 0.3s;
}
.stamp.show { transform: rotate(-14deg) scale(1); opacity: 1; }
.stamp-num {
  font-family: 'EB Garamond', serif;
  font-size: 17px; font-weight: 600; color: var(--orange); line-height: 1;
}
.stamp-lbl {
  font-size: 9px; letter-spacing: 2px; text-transform: uppercase;
  color: var(--orange); font-weight: 500; margin-top: 2px;
}

.restart-btn {
  background: transparent; color: var(--cream-muted);
  border: 1px solid rgba(245,242,236,0.12);
  border-radius: 14px; padding: 16px 28px;
  font-family: 'DM Sans', sans-serif;
  font-size: 14px; cursor: pointer; width: 100%;
  transition: border-color 0.2s, color 0.2s;
}
.restart-btn:hover { border-color: rgba(245,242,236,0.28); color: var(--cream-dim); }

.footer {
  margin-top: 48px; font-size: 10px;
  letter-spacing: 2px; text-transform: uppercase;
  color: rgba(245,242,236,0.11); text-align: center;
}

#confetti-canvas {
  position: fixed; top: 0; left: 0;
  width: 100%; height: 100%;
  pointer-events: none; z-index: 999;
}
</style>
</head>
<body>

<canvas id="confetti-canvas"></canvas>

<div class="topbar" id="topbar">
  <span class="brand">◆ Speak Spanish Way</span>
  <span class="student-name">Erik</span>
</div>

<div class="progress-row" id="progressRow">
  <div class="dots-row" id="dots"></div>
  <span class="prog-text" id="prog">1 / 10</span>
</div>

<div class="scene" id="scene" onclick="flip()">
  <div class="card-body" id="cb">
    <div class="face front">
      <span class="face-label" id="type">sustantivo</span>
      <div class="word" id="word">—</div>
      <span class="tap-hint">👆 Click on the card</span>
    </div>
    <div class="face back">
      <span class="face-label">in English</span>
      <div class="def" id="def">—</div>
      <div class="example" id="ex">—</div>
    </div>
  </div>
</div>

<div class="actions" id="act">
  <button class="btn btn-no"  onclick="ans(false)">✕  Need to review</button>
  <button class="btn btn-yes" onclick="ans(true)">I knew it  ✓</button>
</div>

<div class="receipt-wrap" id="rWrap">
  <div class="receipt">
    <div class="r-top">
      <span class="r-brand">◆ Speak Spanish Way</span>
      <span class="r-date" id="rDate">—</span>
    </div>
    <div class="r-student">Erik</div>
    <div class="r-goal">Soon you'll be ordering tacos in Spanish. 🌮</div>

    <hr class="r-dash">
    <div class="r-items" id="rItems"></div>
    <hr class="r-dash">

    <div class="r-total-row">
      <span class="r-total-label">Total</span>
      <span class="r-total-score" id="rTotal">—</span>
    </div>

    <div class="r-phrase" id="rPhrase">—</div>
    <div class="r-footer">speakspanishway.com</div>

    <div class="stamp" id="stamp">
      <div class="stamp-num" id="stampNum">—</div>
      <div class="stamp-lbl">words</div>
    </div>
  </div>

  <div class="r-whatsapp" id="rWhatsapp">
    <div class="r-whatsapp-text" id="rWhatsappText">—</div>
    <a class="r-whatsapp-btn" id="rWhatsappBtn" href="#" target="_blank">💬 Message José</a>
  </div>

  <div class="hint">↑ screenshot & share</div>
  <button class="restart-btn" onclick="restart()">Practice again</button>
</div>

<div class="footer">speakspanishway.com</div>

<script>
var V = [
  { w: "bucear",        t: "verbo",      d: "to scuba dive / to snorkel",         e: "Voy a bucear con mi hermano en México." },
  { w: "broncearse",    t: "verbo",      d: "to get a tan",                        e: "En la playa me gusta broncearse." },
  { w: "olas",          t: "sustantivo", d: "waves",                               e: "Prefiero un mar con olas grandes." },
  { w: "cenote",        t: "sustantivo", d: "natural freshwater sinkhole",         e: "Vamos a visitar los cenotes cerca de Playa del Carmen." },
  { w: "yo creo que sí",t: "expresión",  d: "I think so / I believe so",           e: "¿Hay muchos pescados? Yo creo que sí." },
  { w: "ayudar",        t: "verbo",      d: "to help",                             e: "Mi esposa me ayuda. Yo la ayudo a ella." },
  { w: "arena",         t: "sustantivo", d: "sand",                                e: "La arena en Playa del Carmen es blanca." },
  { w: "perderse",      t: "verbo",      d: "to get lost",                         e: "No quiero perderme en la ciudad." },
  { w: "recuerdos",     t: "sustantivo", d: "souvenirs / memories",                e: "Puedes comprar recuerdos en el mercado." },
  { w: "artesanías",    t: "sustantivo", d: "crafts / handmade goods",             e: "Los vendedores ofrecen artesanías en el mercado." }
];

var MONTHS = ["January","February","March","April","May","June","July","August","September","October","November","December"];

var PHRASES = [
  [10, "Flawless.\nKeep going."],
  [8,  "Almost perfect.\nThat's real progress."],
  [6,  "Solid work.\nYou're building something."],
  [4,  "Good start.\nReview is part of the process."],
  [0,  "Everything starts\nsomewhere."]
];

var cur = 0, hits = 0, scores = [], flipped = false;

function buildDots() {
  document.getElementById('dots').innerHTML =
    V.map(function(_,i){ return '<div class="dot' + (i===0?' active':'') + '" id="d'+i+'"></div>'; }).join('');
}

function load(i) {
  var v = V[i];
  document.getElementById('type').textContent = v.t;
  document.getElementById('word').textContent = v.w;
  document.getElementById('def').textContent  = v.d;
  document.getElementById('ex').textContent   = '"' + v.e + '"';
  document.getElementById('prog').textContent = (i+1) + ' / ' + V.length;
  var cb = document.getElementById('cb');
  cb.style.transition = 'none';
  cb.classList.remove('flipped');
  cb.offsetHeight;
  cb.style.transition = '';
  flipped = false;
  document.getElementById('act').classList.remove('on');
}

function flip() {
  if (flipped) return;
  flipped = true;
  document.getElementById('cb').classList.add('flipped');
  document.getElementById('act').classList.add('on');
  var hint = document.querySelector('.tap-hint');
  if (hint) hint.style.display = 'none';
}

function ans(knew) {
  scores[cur] = knew;
  if (knew) hits++;
  var dot = document.getElementById('d' + cur);
  dot.classList.remove('active');
  dot.classList.add(knew ? 'hit' : 'miss');
  cur++;
  if (cur >= V.length) { showReceipt(); return; }
  document.getElementById('d' + cur).classList.add('active');
  var sc = document.getElementById('scene');
  sc.style.opacity = '0';
  sc.style.transform = 'translateY(14px)';
  setTimeout(function() {
    load(cur);
    sc.style.opacity = '1';
    sc.style.transform = 'translateY(0)';
  }, 225);
}

function launchConfetti() {
  var canvas = document.getElementById('confetti-canvas');
  var ctx = canvas.getContext('2d');
  canvas.width  = window.innerWidth;
  canvas.height = window.innerHeight;
  var colors = ['#E8681A','#C9A96E','#F5F2EC','#ffffff','#1B2140','#e8a87c'];
  var pieces = [];
  for (var i = 0; i < 120; i++) {
    pieces.push({
      x: Math.random() * canvas.width,
      y: -10 - Math.random() * 200,
      w: 6 + Math.random() * 8, h: 3 + Math.random() * 5,
      color: colors[Math.floor(Math.random() * colors.length)],
      rot: Math.random() * Math.PI * 2,
      vx: (Math.random() - 0.5) * 2.5,
      vy: 2.5 + Math.random() * 3,
      vr: (Math.random() - 0.5) * 0.15,
      opacity: 1
    });
  }
  var start = null, duration = 3000;
  function draw(ts) {
    if (!start) start = ts;
    var elapsed = ts - start;
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    pieces.forEach(function(p) {
      p.x += p.vx; p.y += p.vy; p.rot += p.vr; p.vy += 0.06;
      if (elapsed > duration * 0.6) p.opacity = Math.max(0, p.opacity - 0.018);
      ctx.save();
      ctx.globalAlpha = p.opacity;
      ctx.translate(p.x, p.y);
      ctx.rotate(p.rot);
      ctx.fillStyle = p.color;
      ctx.fillRect(-p.w/2, -p.h/2, p.w, p.h);
      ctx.restore();
    });
    if (elapsed < duration + 600) requestAnimationFrame(draw);
    else ctx.clearRect(0, 0, canvas.width, canvas.height);
  }
  requestAnimationFrame(draw);
}

function showReceipt() {
  document.getElementById('scene').style.display       = 'none';
  document.getElementById('act').style.display         = 'none';
  document.getElementById('topbar').style.display      = 'none';
  document.getElementById('progressRow').style.display = 'none';

  var now = new Date();
  document.getElementById('rDate').textContent = MONTHS[now.getMonth()] + ' ' + now.getDate() + ', ' + now.getFullYear();

  var container = document.getElementById('rItems');
  container.innerHTML = '';
  V.forEach(function(v, i) {
    var el = document.createElement('div');
    el.className = 'r-item';
    el.style.animationDelay = (i * 0.09) + 's';
    var knew = scores[i];
    el.innerHTML = '<span class="r-mark ' + (knew?'hit':'miss') + '">' + (knew?'✓':'✗') + '</span>' +
                   '<span class="r-word">' + v.w + '</span>';
    container.appendChild(el);
  });

  document.getElementById('rTotal').textContent   = hits + ' / ' + V.length;
  document.getElementById('stampNum').textContent = hits + '/' + V.length;

  var p = PHRASES.filter(function(x){ return hits >= x[0]; })[0];
  document.getElementById('rPhrase').textContent = p[1];

  document.getElementById('rWrap').style.display = 'flex';
  launchConfetti();

  var firstMiss = V.find(function(v, i){ return scores[i] === false; });
  var waText, waMsg;
  if (firstMiss) {
    waText = 'Struggled with <strong>"' + firstMiss.w + '"</strong>? Send me a message using it in a sentence — that\'s how words stick.';
    waMsg  = encodeURIComponent('Hi José, practicing "' + firstMiss.w + '": ');
  } else {
    waText = '10 out of 10. Pick your favorite word and use it in a sentence — send me the message.';
    waMsg  = encodeURIComponent('Hi José, practicing vocabulary: ');
  }
  document.getElementById('rWhatsappText').innerHTML = waText;
  document.getElementById('rWhatsappBtn').href = 'https://wa.me/542914649505?text=' + waMsg;

  setTimeout(function() {
    document.getElementById('stamp').classList.add('show');
  }, V.length * 90 + 420);
}

function restart() {
  cur = 0; hits = 0; scores = [];
  var s = document.getElementById('stamp');
  s.classList.remove('show');
  s.style.animation = 'none';
  s.offsetHeight;
  s.style.animation = '';
  document.getElementById('rWrap').style.display       = 'none';
  document.getElementById('scene').style.display       = '';
  document.getElementById('act').style.display         = '';
  document.getElementById('topbar').style.display      = '';
  document.getElementById('progressRow').style.display = '';
  buildDots();
  load(0);
}

buildDots();
load(0);
</script>
</body>
</html>
